<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bar App" />
  <title>Bar Bestelapp</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root {
      --bg: #020617;
      --panel: #0f172a;
      --panel-2: #334155;
      --text: #ffffff;
      --muted: #e2e8f0;
      --accent: #fbbf24;
      --danger: #ef4444;
      --success: #22c55e;
      --border: rgba(255,255,255,.24);
      --shadow: 0 12px 28px rgba(0,0,0,.25);
    }

    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(245,158,11,.12), transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    button, input { font: inherit; }

    .app {
      width: min(100%, 720px);
      margin: 0 auto;
      padding:
        max(16px, env(safe-area-inset-top))
        16px
        max(18px, env(safe-area-inset-bottom));
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .kiosk-button.active {
      background: var(--success);
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 6vw, 34px);
      letter-spacing: -.03em;
    }

    .icon-button {
      width: 48px;
      height: 48px;
      border: 0;
      border-radius: 14px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 24px;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .product-button {
      min-height: 126px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: linear-gradient(145deg, #475569, #1e293b);
      color: var(--text);
      padding: 16px;
      box-shadow: var(--shadow);
      cursor: pointer;
      touch-action: manipulation;
      transition: transform .08s ease, filter .08s ease;
    }

    .product-button:active {
      transform: scale(.97);
      filter: brightness(1.15);
    }

    .product-button:hover,
    .product-button:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
      filter: brightness(1.12);
    }

    .icon-button:hover,
    .icon-button:focus-visible,
    .action-button:focus-visible,
    .minus-button:focus-visible,
    .cancel-button:focus-visible,
    .save-button:focus-visible {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
    }

    .product-name {
      display: block;
      font-size: clamp(24px, 7vw, 34px);
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 10px;
    }

    .product-price {
      display: block;
      color: var(--muted);
      font-size: 18px;
      font-weight: 700;
    }

    .panel {
      background: rgba(15,23,42,.98);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 18px 8px;
    }

    .order-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .order-row:last-child { border-bottom: 0; }

    .order-main {
      min-width: 0;
    }

    .order-name {
      font-weight: 800;
      font-size: 18px;
    }

    .order-meta {
      color: var(--muted);
      font-size: 14px;
      margin-top: 3px;
    }

    .order-subtotal {
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .minus-button {
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 12px;
      background: #475569;
      color: white;
      font-size: 24px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .total {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 2px solid var(--border);
    }

    .total-label {
      font-size: 20px;
      font-weight: 800;
    }

    .total-value {
      font-size: clamp(30px, 9vw, 46px);
      font-weight: 900;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 12px;
    }

    .action-button {
      min-height: 58px;
      border: 0;
      border-radius: 16px;
      color: white;
      font-weight: 800;
      font-size: 17px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .undo { background: #475569; }
    .clear { background: var(--danger); }

    .secondary-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .tertiary-button {
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .tertiary-button:hover,
    .tertiary-button:focus-visible {
      color: var(--text);
      border-color: var(--text);
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }

    .payment-summary {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .payment-line {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
    }

    .payment-line strong {
      font-variant-numeric: tabular-nums;
    }

    .received-input {
      width: 100%;
      min-height: 64px;
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 10px 14px;
      background: #334155;
      color: white;
      font-size: 30px;
      font-weight: 900;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .received-input:focus {
      border-color: var(--accent);
      outline: 3px solid rgba(251,191,36,.32);
    }

    .quick-amounts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .quick-amount {
      min-height: 48px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #334155;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    .change-result {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #020617;
      text-align: center;
    }

    .change-result-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .change-result-value {
      margin-top: 4px;
      color: var(--accent);
      font-size: clamp(34px, 10vw, 52px);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .change-result-value.short {
      color: #f87171;
      font-size: clamp(26px, 8vw, 40px);
    }


    .settings-product-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 110px 44px;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .settings-product-row input {
      min-height: 46px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 12px;
      background: #334155;
      color: white;
      font-size: 16px;
      font-weight: 700;
    }

    .remove-product-button {
      min-height: 44px;
      border: 1px solid rgba(248,113,113,.7);
      border-radius: 12px;
      background: transparent;
      color: #fecaca;
      font-size: 20px;
      cursor: pointer;
    }

    .product-settings-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    @media (max-width: 520px) {
      .settings-product-row {
        grid-template-columns: minmax(0, 1fr) 94px 42px;
      }
    }

    .kiosk-notice {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin-top: 14px;
    }

    dialog {
      width: min(calc(100% - 28px), 520px);
      max-height: 90vh;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: #0f172a;
      color: var(--text);
      padding: 0;
      box-shadow: 0 24px 70px rgba(0,0,0,.55);
    }

    dialog::backdrop {
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(3px);
    }

    .dialog-body { padding: 20px; }

    .dialog-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .dialog-header h2 { margin: 0; }

    .settings-grid {
      display: grid;
      gap: 14px;
    }

    .setting-row {
      display: grid;
      grid-template-columns: 1fr 140px;
      align-items: center;
      gap: 12px;
    }

    .setting-row label {
      font-weight: 800;
      font-size: 17px;
    }

    .price-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #334155;
      color: white;
      font-size: 18px;
      text-align: right;
    }

    .dialog-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .cancel-button, .save-button {
      min-height: 52px;
      border: 0;
      border-radius: 14px;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    .cancel-button { background: #475569; }
    .save-button { background: var(--success); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(24px, env(safe-area-inset-bottom));
      transform: translate(-50%, 20px);
      background: #000000;
      color: white;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 16px;
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      box-shadow: var(--shadow);
      z-index: 20;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 420px) {
      .product-button { min-height: 112px; }
      .actions { grid-template-columns: 1fr; }
      .setting-row { grid-template-columns: 1fr 120px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Bestelling</h1>
      <div class="header-actions">
        <button class="icon-button kiosk-button" id="kioskButton" aria-label="Kioskmodus starten" title="Kioskmodus">⛶</button>
        <button class="icon-button" id="settingsButton" aria-label="Prijsinstellingen">⚙️</button>
      </div>
    </header>

    <section class="products" id="productButtons" aria-label="Producten"></section>

    <section class="panel" aria-live="polite">
      <h2>Overzicht</h2>
      <div id="orderOverview"></div>
      <div class="total">
        <span class="total-label">Totaal</span>
        <span class="total-value" id="totalValue">€ 0,00</span>
      </div>
    </section>

    <section class="actions">
      <button class="action-button undo" id="undoButton">Laatste terug</button>
      <button class="action-button clear" id="clearButton">Nieuwe bestelling</button>
    </section>

    <section class="secondary-actions">
      <button class="tertiary-button" id="changeButton">Wisselgeld berekenen</button>
    </section>
  </main>

  <dialog id="settingsDialog">
    <form method="dialog" class="dialog-body" id="settingsForm">
      <div class="dialog-header">
        <h2>Prijzen aanpassen</h2>
        <button type="button" class="icon-button" id="closeSettings" aria-label="Sluiten">×</button>
      </div>
      <div class="settings-grid" id="settingsGrid"></div>
      <div class="product-settings-actions">
        <button type="button" class="tertiary-button" id="addProductButton">+ Product toevoegen</button>
        <button type="button" class="tertiary-button" id="resetProductsButton">Standaard herstellen</button>
      </div>
      <div class="dialog-actions">
        <button type="button" class="cancel-button" id="cancelSettings">Annuleren</button>
        <button type="submit" class="save-button">Opslaan</button>
      </div>
    </form>
  </dialog>

  <dialog id="changeDialog">
    <form method="dialog" class="dialog-body" id="changeForm">
      <div class="dialog-header">
        <h2>Wisselgeld</h2>
        <button type="button" class="icon-button" id="closeChange" aria-label="Sluiten">×</button>
      </div>

      <div class="payment-summary">
        <div class="payment-line">
          <span>Te betalen</span>
          <strong id="paymentTotal">€ 0,00</strong>
        </div>
      </div>

      <label for="receivedAmount">Ontvangen bedrag</label>
      <input
        class="received-input"
        id="receivedAmount"
        type="number"
        min="0"
        step="0.01"
        inputmode="decimal"
        placeholder="0,00"
        autocomplete="off"
      />

      <div class="quick-amounts" id="quickAmounts"></div>

      <div class="change-result">
        <div class="change-result-label" id="changeResultLabel">Wisselgeld</div>
        <div class="change-result-value" id="changeResultValue">€ 0,00</div>
      </div>

      <div class="dialog-actions">
        <button type="button" class="cancel-button" id="clearReceived">Wissen</button>
        <button type="submit" class="save-button">Klaar</button>
      </div>
    </form>
  </dialog>

  <div class="toast" id="toast"></div>

  <script>
    const EMBEDDED_DEFAULT_PRODUCTS = [
      { id: "bier", name: "Bier", price: 3.00 },
      { id: "wijn", name: "Wijn", price: 4.00 },
      { id: "fris", name: "Fris", price: 2.50 },
      { id: "stelz", name: "Stëlz", price: 4.50 }
    ];

    const PRODUCTS_STORAGE_KEY = "bar-bestelapp-products-v1";

    const formatter = new Intl.NumberFormat("nl-NL", {
      style: "currency",
      currency: "EUR"
    });

    let products = [];
    let order = {};
    let history = [];

    const productButtons = document.getElementById("productButtons");
    const orderOverview = document.getElementById("orderOverview");
    const totalValue = document.getElementById("totalValue");
    const settingsDialog = document.getElementById("settingsDialog");
    const settingsGrid = document.getElementById("settingsGrid");
    const changeDialog = document.getElementById("changeDialog");
    const receivedAmount = document.getElementById("receivedAmount");
    const paymentTotal = document.getElementById("paymentTotal");
    const quickAmounts = document.getElementById("quickAmounts");
    const changeResultLabel = document.getElementById("changeResultLabel");
    const changeResultValue = document.getElementById("changeResultValue");
    const kioskButton = document.getElementById("kioskButton");
    const toast = document.getElementById("toast");
    let kioskActive = false;

    function cloneEmbeddedDefaults() {
      return EMBEDDED_DEFAULT_PRODUCTS.map((product, index) =>
        normalizeProduct(product, index)
      );
    }

    function normalizeProduct(product, index) {
      const name = String(product?.name || `Product ${index + 1}`).trim();
      const price = Number(product?.price);
      const rawId = String(product?.id || name || `product-${index + 1}`)
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");

      return {
        id: rawId || `product-${Date.now()}-${index}`,
        name: name || `Product ${index + 1}`,
        price: Number.isFinite(price) && price >= 0 ? price : 0
      };
    }

    async function loadDefaultProducts() {
      // Browsers block fetch() from file:// pages. In that case the embedded
      // fallback keeps the downloaded app fully functional.
      if (window.location.protocol === "file:") {
        return cloneEmbeddedDefaults();
      }

      try {
        const response = await fetch("./products.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        if (!Array.isArray(data.products) || !data.products.length) {
          throw new Error("Ongeldig products.json");
        }
        return data.products.map(normalizeProduct);
      } catch (error) {
        console.warn("products.json kon niet worden geladen; ingebouwde defaults worden gebruikt.", error);
        return cloneEmbeddedDefaults();
      }
    }

    async function loadProducts() {
      const defaults = await loadDefaultProducts();
      const saved = localStorage.getItem(PRODUCTS_STORAGE_KEY);

      if (!saved) {
        products = defaults;
        saveProducts();
        return;
      }

      try {
        const parsed = JSON.parse(saved);
        products = Array.isArray(parsed) && parsed.length
          ? parsed.map(normalizeProduct)
          : defaults;
      } catch (error) {
        console.warn("Lokale productinstellingen waren ongeldig.", error);
        products = defaults;
        saveProducts();
      }
    }

    function saveProducts() {
      localStorage.setItem(PRODUCTS_STORAGE_KEY, JSON.stringify(products));
    }

    function makeUniqueId(name, existingIds, fallbackIndex) {
      const baseId = String(name || `product-${fallbackIndex + 1}`)
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || `product-${fallbackIndex + 1}`;

      let id = baseId;
      let suffix = 2;
      while (existingIds.has(id)) {
        id = `${baseId}-${suffix++}`;
      }
      existingIds.add(id);
      return id;
    }

    function renderProducts() {
      productButtons.innerHTML = "";
      products.forEach(product => {
        const button = document.createElement("button");
        button.className = "product-button";
        button.type = "button";
        button.innerHTML = `
          <span class="product-name">${product.name}</span>
          <span class="product-price">${formatter.format(product.price)}</span>
        `;
        button.addEventListener("click", () => addProduct(product.id));
        productButtons.appendChild(button);
      });
    }

    function addProduct(id) {
      order[id] = (order[id] || 0) + 1;
      history.push(id);
      if (navigator.vibrate) navigator.vibrate(20);
      renderOrder();
    }

    function removeOne(id) {
      if (!order[id]) return;
      order[id] -= 1;
      if (order[id] <= 0) delete order[id];

      const lastIndex = history.lastIndexOf(id);
      if (lastIndex >= 0) history.splice(lastIndex, 1);
      renderOrder();
    }

    function undoLast() {
      const id = history.pop();
      if (!id) {
        showToast("Er is niets om terug te draaien");
        return;
      }
      order[id] -= 1;
      if (order[id] <= 0) delete order[id];
      renderOrder();
    }

    function clearOrder() {
      if (Object.keys(order).length === 0) {
        showToast("De bestelling is al leeg");
        return;
      }
      if (confirm("Nieuwe bestelling starten en alles wissen?")) {
        order = {};
        history = [];
        renderOrder();
        showToast("Nieuwe bestelling gestart");
      }
    }

    function renderOrder() {
      const activeProducts = products.filter(product => order[product.id] > 0);

      if (activeProducts.length === 0) {
        orderOverview.innerHTML = `<div class="empty">Tik op een product om het toe te voegen.</div>`;
        totalValue.textContent = formatter.format(0);
        return;
      }

      orderOverview.innerHTML = "";
      let total = 0;

      activeProducts.forEach(product => {
        const quantity = order[product.id];
        const subtotal = quantity * product.price;
        total += subtotal;

        const row = document.createElement("div");
        row.className = "order-row";
        row.innerHTML = `
          <div class="order-main">
            <div class="order-name">${product.name}</div>
            <div class="order-meta">${quantity} × ${formatter.format(product.price)}</div>
          </div>
          <div class="order-subtotal">${formatter.format(subtotal)}</div>
        `;

        const minusButton = document.createElement("button");
        minusButton.type = "button";
        minusButton.className = "minus-button";
        minusButton.textContent = "−";
        minusButton.setAttribute("aria-label", `Eén ${product.name} verwijderen`);
        minusButton.addEventListener("click", () => removeOne(product.id));

        row.appendChild(minusButton);
        orderOverview.appendChild(row);
      });

      totalValue.textContent = formatter.format(total);
    }

    function openSettings() {
      settingsGrid.innerHTML = "";

      products.forEach((product, index) => {
        const row = document.createElement("div");
        row.className = "settings-product-row";
        row.dataset.index = index;

        const nameInput = document.createElement("input");
        nameInput.type = "text";
        nameInput.value = product.name;
        nameInput.placeholder = "Productnaam";
        nameInput.className = "settings-name";

        const priceInput = document.createElement("input");
        priceInput.type = "number";
        priceInput.min = "0";
        priceInput.step = "0.01";
        priceInput.inputMode = "decimal";
        priceInput.value = product.price.toFixed(2);
        priceInput.placeholder = "Prijs";
        priceInput.className = "settings-price";

        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.className = "remove-product-button";
        removeButton.setAttribute("aria-label", `${product.name} verwijderen`);
        removeButton.textContent = "×";
        removeButton.addEventListener("click", () => row.remove());

        row.append(nameInput, priceInput, removeButton);
        settingsGrid.appendChild(row);
      });

      settingsDialog.showModal();
    }

    function addProductSettingsRow() {
      const row = document.createElement("div");
      row.className = "settings-product-row";

      const nameInput = document.createElement("input");
      nameInput.type = "text";
      nameInput.placeholder = "Nieuw product";
      nameInput.className = "settings-name";

      const priceInput = document.createElement("input");
      priceInput.type = "number";
      priceInput.min = "0";
      priceInput.step = "0.01";
      priceInput.inputMode = "decimal";
      priceInput.value = "0.00";
      priceInput.placeholder = "Prijs";
      priceInput.className = "settings-price";

      const removeButton = document.createElement("button");
      removeButton.type = "button";
      removeButton.className = "remove-product-button";
      removeButton.setAttribute("aria-label", "Product verwijderen");
      removeButton.textContent = "×";
      removeButton.addEventListener("click", () => row.remove());

      row.append(nameInput, priceInput, removeButton);
      settingsGrid.appendChild(row);
      nameInput.focus();
    }

    async function resetProductsToDefaults() {
      products = await loadDefaultProducts();
      saveProducts();

      Object.keys(order).forEach(key => delete order[key]);
      history.length = 0;
      saveState();
      renderProducts();
      renderOrder();
      openSettings();
      showToast("Standaardproducten hersteld");
    }

    function saveSettings(event) {
      event.preventDefault();

      const rows = [...settingsGrid.querySelectorAll(".settings-product-row")];
      const existingIds = new Set();
      const nextProducts = [];

      rows.forEach((row, index) => {
        const nameInput = row.querySelector(".settings-name");
        const priceInput = row.querySelector(".settings-price");

        // Ignore stale rows left by an older cached version.
        if (!nameInput || !priceInput) return;

        const name = nameInput.value.trim();
        const price = Number(String(priceInput.value).replace(",", "."));

        if (!name) return;

        const oldProduct = products[index];
        const id = oldProduct && oldProduct.name === name && !existingIds.has(oldProduct.id)
          ? (existingIds.add(oldProduct.id), oldProduct.id)
          : makeUniqueId(name, existingIds, index);

        nextProducts.push({
          id,
          name,
          price: Number.isFinite(price) && price >= 0 ? price : 0
        });
      });

      if (!nextProducts.length) {
        showToast("Voeg minimaal één product toe");
        return;
      }

      const validIds = new Set(nextProducts.map(product => product.id));
      Object.keys(order).forEach(id => {
        if (!validIds.has(id)) delete order[id];
      });

      products = nextProducts;
      saveProducts();
      saveState();
      renderProducts();
      renderOrder();
      closeSettings();
      showToast("Producten opgeslagen");
    }

    function closeSettings() {
      settingsDialog.close();
    }


    function getOrderTotal() {
      return products.reduce((sum, product) => {
        return sum + (order[product.id] || 0) * product.price;
      }, 0);
    }

    function openChangeDialog() {
      const total = getOrderTotal();
      if (total <= 0) {
        showToast("Voeg eerst producten toe");
        return;
      }

      paymentTotal.textContent = formatter.format(total);
      receivedAmount.value = "";
      buildQuickAmounts(total);
      updateChangeResult();
      changeDialog.showModal();
      requestAnimationFrame(() => receivedAmount.focus());
    }

    function closeChangeDialog() {
      changeDialog.close();
    }

    function buildQuickAmounts(total) {
      const candidates = [
        Math.ceil(total),
        Math.ceil(total / 5) * 5,
        Math.ceil(total / 10) * 10,
        20,
        50,
        100
      ];
      const unique = [...new Set(candidates)]
        .filter(value => value >= total && value > 0)
        .sort((a, b) => a - b)
        .slice(0, 6);

      quickAmounts.innerHTML = "";
      unique.forEach(value => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "quick-amount";
        button.textContent = formatter.format(value);
        button.addEventListener("click", () => {
          receivedAmount.value = value.toFixed(2);
          updateChangeResult();
        });
        quickAmounts.appendChild(button);
      });
    }

    function parseReceivedAmount() {
      const value = Number(String(receivedAmount.value).replace(",", "."));
      return Number.isFinite(value) ? value : 0;
    }

    function updateChangeResult() {
      const total = getOrderTotal();
      const received = parseReceivedAmount();
      const difference = received - total;

      if (!receivedAmount.value) {
        changeResultLabel.textContent = "Wisselgeld";
        changeResultValue.textContent = formatter.format(0);
        changeResultValue.classList.remove("short");
        return;
      }

      if (difference < 0) {
        changeResultLabel.textContent = "Nog te ontvangen";
        changeResultValue.textContent = formatter.format(Math.abs(difference));
        changeResultValue.classList.add("short");
      } else {
        changeResultLabel.textContent = "Wisselgeld";
        changeResultValue.textContent = formatter.format(difference);
        changeResultValue.classList.remove("short");
      }
    }

    function isStandalone() {
      return window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true;
    }

    async function toggleKioskMode() {
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
          return;
        }

        if (document.documentElement.requestFullscreen) {
          await document.documentElement.requestFullscreen({ navigationUI: "hide" });
          kioskActive = true;
          updateKioskButton();
          showToast("Kioskmodus actief");
          return;
        }

        if (isStandalone()) {
          kioskActive = true;
          updateKioskButton();
          showToast("De geïnstalleerde app draait al zonder browserbalk");
          return;
        }

        showToast("Installeer de app op het beginscherm voor kioskweergave");
      } catch (_) {
        showToast("Kioskmodus kon niet worden gestart");
      }
    }

    function updateKioskButton() {
      const active = Boolean(document.fullscreenElement) || kioskActive || isStandalone();
      kioskButton.classList.toggle("active", active);
      kioskButton.textContent = active ? "🔒" : "⛶";
      kioskButton.setAttribute(
        "aria-label",
        active ? "Kioskmodus verlaten" : "Kioskmodus starten"
      );
    }

    document.addEventListener("fullscreenchange", () => {
      kioskActive = Boolean(document.fullscreenElement);
      updateKioskButton();
      if (!document.fullscreenElement && !isStandalone()) {
        showToast("Kioskmodus verlaten");
      }
    });

    window.addEventListener("beforeunload", event => {
      if (!kioskActive && !document.fullscreenElement) return;
      event.preventDefault();
      event.returnValue = "";
    });

    let toastTimer;
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    document.getElementById("settingsButton").addEventListener("click", openSettings);
    document.getElementById("closeSettings").addEventListener("click", closeSettings);
    document.getElementById("cancelSettings").addEventListener("click", closeSettings);
    document.getElementById("settingsForm").addEventListener("submit", saveSettings);
    document.getElementById("addProductButton").addEventListener("click", addProductSettingsRow);
    document.getElementById("resetProductsButton").addEventListener("click", resetProductsToDefaults);
    document.getElementById("undoButton").addEventListener("click", undoLast);
    document.getElementById("clearButton").addEventListener("click", clearOrder);
    document.getElementById("changeButton").addEventListener("click", openChangeDialog);
    document.getElementById("closeChange").addEventListener("click", closeChangeDialog);
    document.getElementById("clearReceived").addEventListener("click", () => {
      receivedAmount.value = "";
      updateChangeResult();
      receivedAmount.focus();
    });
    document.getElementById("changeForm").addEventListener("submit", event => {
      event.preventDefault();
      closeChangeDialog();
    });
    receivedAmount.addEventListener("input", updateChangeResult);
    kioskButton.addEventListener("click", toggleKioskMode);

    settingsDialog.addEventListener("click", event => {
      const rect = settingsDialog.getBoundingClientRect();
      const outside =
        event.clientX < rect.left ||
        event.clientX > rect.right ||
        event.clientY < rect.top ||
        event.clientY > rect.bottom;
      if (outside) closeSettings();
    });

    changeDialog.addEventListener("click", event => {
      const rect = changeDialog.getBoundingClientRect();
      const outside =
        event.clientX < rect.left ||
        event.clientX > rect.right ||
        event.clientY < rect.top ||
        event.clientY > rect.bottom;
      if (outside) closeChangeDialog();
    });

    (async function initializeApp() {
      await loadProducts();
      renderProducts();
      renderOrder();
      updateKioskButton();
    })();

    if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(console.warn);
      });
    }
  </script>
</body>
</html>
